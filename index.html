<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<div id="app">

    <div id="title">
        
    </div>

    <div id="webcam-container"></div>

    <div id="label-container">
        商品を認識してください
    </div>

    <button id="productButton">
        商品情報を表示
    </button>

    <div id="bottomUI">

        <button id="backButton">
            ↩
        </button>

        <!-- 検索欄 -->
        <div id="searchWrapper">

            <span id="searchIcon">
                🔍
            </span>

            <input
            id="searchBox"
            type="text"
            placeholder="認識されない時はこちら">

        </div>

    </div>

</div>

<!-- AI判定用canvas -->
<canvas id="zoomCanvas"
width="300"
height="300"
style="display:none;">
</canvas>

<style>

body{

    margin:0;

    background:#efefef;

    font-family:sans-serif;

    overflow:hidden;
}

#app{

    width:100vw;

    height:100vh;

    position:relative;

    overflow:hidden;

    padding:20px;

    box-sizing:border-box;
}

#title{

    text-align:center;

    font-size:18px;

    margin-top:5px;
}

#webcam-container{

    width:100%;

    height:55vh;

    overflow:hidden;

    background:black;

    margin-top:20px;

    border-radius:20px;
}

canvas{

    width:100%;

    height:100%;

    transform:scale(1);

    transform-origin:center;

    touch-action:none;

    object-fit:cover;
}

#label-container{

    text-align:center;

    margin-top:25px;

    font-size:22px;

    min-height:30px;
}

#productButton{

    width:210px;

    height:60px;

    border:none;

    border-radius:8px;

    font-size:24px;

    color:white;

    display:block;

    margin:25px auto 0 auto;

    background:#9e9e9e;

    transition:0.2s;
}

/* 認識成功時 */

#productButton.active{

    background:#ff7a00;
}

#bottomUI{

    width:calc(100% - 40px);

    position:absolute;

    bottom:max(80px, env(safe-area-inset-bottom));

    left:20px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    box-sizing:border-box;

    gap:12px;
}

#backButton{

    width:55px;

    height:55px;

    border:none;

    border-radius:10px;

    background:#8799ff;

    color:white;

    font-size:32px;

    flex-shrink:0;
}

/* ===== 検索欄 ===== */

#searchWrapper{

    flex:1;

    height:42px;

    background:white;

    border:2px solid #777;

    border-radius:30px;

    display:flex;

    align-items:center;

    padding:0 14px;

    box-sizing:border-box;
}

#searchIcon{

    font-size:16px;

    color:#999;

    margin-right:8px;
}

#searchBox{

    flex:1;

    height:100%;

    border:none;

    outline:none;

    font-size:14px;

    background:transparent;
}

#searchBox::placeholder{

    color:#999;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">

const URL = "./my_model/";

let model, webcam;

let labelContainer;
let maxPredictions;

// AI判定用canvas
let zoomCanvas;
let zoomCtx;

// 現在の商品URL保存用
let currentURL = "";

// ズーム用
let zoomLevel = 1;
let lastPredictTime = 0;
let initialDistance = 0;

async function init() {

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(
        modelURL,
        metadataURL
    );

    maxPredictions =
        model.getTotalClasses();

    const flip = false;

    webcam =
        new tmImage.Webcam(
            1080,
            1080,
            flip
        );

    await webcam.setup({
        facingMode: "environment"
    });

    await webcam.play();

    window.requestAnimationFrame(loop);

    document
        .getElementById("webcam-container")
        .appendChild(webcam.canvas);

    // AI判定用canvas取得
    zoomCanvas =
        document.getElementById("zoomCanvas");

    zoomCtx =
        zoomCanvas.getContext("2d");

    // ===== ピンチズーム =====

    const canvas = webcam.canvas;

    canvas.addEventListener(
        "touchmove",
        (e) => {

        if (e.touches.length === 2) {

            e.preventDefault();

            const dx =
                e.touches[0].clientX -
                e.touches[1].clientX;

            const dy =
                e.touches[0].clientY -
                e.touches[1].clientY;

            const distance =
                Math.sqrt(dx * dx + dy * dy);

            if (initialDistance === 0) {

                initialDistance = distance;
            }

            else {

                const scaleChange =
                    distance / initialDistance;

                zoomLevel *= scaleChange;

                // 最小1倍 最大3倍
                zoomLevel =
                    Math.max(
                        1,
                        Math.min(3, zoomLevel)
                    );

                // 見た目ズーム
                canvas.style.transform =
                    `scale(${zoomLevel})`;

                initialDistance = distance;
            }
        }

    }, { passive: false });

    canvas.addEventListener(
        "touchend",
        () => {

        initialDistance = 0;
    });

    // =====================

    labelContainer =
        document.getElementById(
            "label-container"
        );
}

async function loop() {

    webcam.update();

    const now = Date.now();

    // 100msごとに判定
    if(now - lastPredictTime > 100){

        await predict();

        lastPredictTime = now;
    }

    window.requestAnimationFrame(loop);
}

async function predict() {

    const button =
        document.getElementById(
            "productButton"
        );

    // ===== AI用ズーム処理 =====

    const sourceWidth =
        webcam.canvas.width;

    const sourceHeight =
        webcam.canvas.height;

    const cropWidth =
        sourceWidth / zoomLevel;

    const cropHeight =
        sourceHeight / zoomLevel;

    const sx =
        (sourceWidth - cropWidth) / 2;

    const sy =
        (sourceHeight - cropHeight) / 2;

    zoomCtx.clearRect(0, 0, 300, 300);

    zoomCtx.drawImage(
        webcam.canvas,
        sx,
        sy,
        cropWidth,
        cropHeight,
        0,
        0,
        300,
        300
    );

    // AI判定
    const prediction =
        await model.predict(zoomCanvas);

    // 一番認識率高いもの取得
    let highest = prediction[0];

    for (let i = 1; i < prediction.length; i++) {

        if (
            prediction[i].probability >
            highest.probability
        ) {

            highest = prediction[i];
        }
    }

    // 表示
    labelContainer.innerHTML =
        highest.className +
        " : " +
        Math.floor(
            highest.probability * 100
        ) + "%";

    currentURL = "";

    button.classList.remove("active");

    // URL切り替え
    if (highest.probability > 0.85) {

        switch(highest.className) {

            case "たまご蒸しパン":

                currentURL =
                "https://www.sej.co.jp/products/a/item/303213/";

                break;

            case "ベルギーワッフル":

                currentURL =
                "https://www.sej.co.jp/products/a/item/322741/";

                break;

            case "こしあんドーナツ":

                currentURL =
                "https://www.sej.co.jp/products/a/item/303745/";

                break;

            case "タルタルフィッシュバーガー":

                currentURL =
                "https://www.sej.co.jp/products/a/item/303431/";

                break;

            case "チョコチップクッキー":

                currentURL =
                "https://www.sej.co.jp/products/a/item/321625/";

                break;

            case "エビマヨおにぎり":

                currentURL =
                "https://www.sej.co.jp/products/a/item/041802/";

                break;

            case "ツナマヨおにぎり":

                currentURL =
                "https://www.sej.co.jp/products/a/item/041909/";

                break;

            case "ピーナッツチョコ":

                currentURL =
                "https://www.sej.co.jp/products/a/item/322600/";

                break;

            case "高菜おにぎり":

                currentURL =
                "https://www.sej.co.jp/products/a/item/042687/";

                break;
        }

        // ボタンON
        if(
            currentURL !== "" &&
            highest.className !== "その他"
        ){

            button.classList.add("active");
        }
    }
}

// ボタン押した時
document
.getElementById("productButton")
.onclick = () => {

    if(currentURL !== "") {

        window.open(currentURL);
    }
}

// 検索欄
const searchBox =
    document.getElementById("searchBox");

// Enterで検索
searchBox.addEventListener(
    "keydown",
    (e) => {

    if(e.key === "Enter") {

        const keyword =
            searchBox.value.trim();

        if(keyword !== "") {

            const searchURL =
                "https://www.sej.co.jp/products/a/itemresult/?key=" +
                encodeURIComponent(keyword) + "&x=0&y=0";

            window.open(searchURL);
        }
    }
});

// 起動
init();

</script>
