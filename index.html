            </span>

<style>

body{

    margin:0;

    background:#efefef;

    font-family:sans-serif;

    overflow:hidden;
}

#app{

    width:100vw;

    height:100vh;

    position:relative;

    overflow:hidden;

    padding:20px;

    box-sizing:border-box;
}

#title{

    text-align:center;

    font-size:18px;

    margin-top:5px;
}

#version{

    position:absolute;

    top:10px;

    right:15px;

    font-size:12px;

    color:#b6b6b6;

    z-index:1000;

    user-select:none;
}

#webcam-container{

    width:100%;

    height:55vh;

    overflow:hidden;

    background:black;

    margin-top:20px;

    border-radius:20px;
    
    
}


canvas{

    width:100%;

    height:100%;

    transform:scale(1);

    transform-origin:center;

    touch-action:none;

    object-fit:cover;
}

#label-container{

    text-align:center;

    margin-top:25px;

    font-size:22px;

    min-height:30px;
}

#productButton{

    width:210px;

    height:60px;

    border:none;

    border-radius:8px;

    font-size:24px;

    color:white;

    display:block;

    margin:25px auto 0 auto;    

    background:#9e9e9e;

    transition:0.2s;
}

/* 認識成功時 */

#productButton.active{

    background:#ff7a00;
}

#bottomUI{

    width:calc(100% - 40px);

    position:absolute;

    bottom:max(80px, env(safe-area-inset-bottom));

    left:20px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    box-sizing:border-box;

    gap:12px;
}

#backButton{

    width:55px;

    height:55px;

    border:none;

    border-radius:10px;

    background:#8799ff;

    color:white;

    font-size:32px;

    flex-shrink:0;
}

/* ===== 検索欄 ===== */

#searchWrapper{

    flex:1;

    height:42px;

    background:white;

    border:2px solid #777;

    border-radius:30px;

    display:flex;

    align-items:center;

    padding:0 14px;

    box-sizing:border-box;
}

#searchIcon{

    font-size:16px;

    color:#999;

    margin-right:8px;
}

#searchBox{

    flex:1;

    height:100%;

    border:none;

    outline:none;

    font-size:14px;

    background:transparent;
}

#searchBox::placeholder{

    color:#999;
}

#recognitionOverlay{

    position:absolute;

    top:40px;

    left:20px;

    width:calc(100% - 40px);

    height:56.5vh;

    display:none;

    justify-content:center;

    align-items:center;

    background:rgba(0,0,0,0.25);

    border-radius:20px;

    z-index:100;
}

#overlayText{

    color:white;

    text-align:center;

    font-size:22px;

    font-weight:bold;

    text-shadow:0 0 8px black;
}

</style>

async function init() {

    await loadProducts();

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(
        modelURL,
        metadataURL
    );

    maxPredictions =
        model.getTotalClasses();

    const flip = false;

    webcam =
        new tmImage.Webcam(
            1080,
            1080,
            flip
        );

    await webcam.setup({
        facingMode: "environment"
    });

    await webcam.play();

    window.requestAnimationFrame(loop);

    document
        .getElementById("webcam-container")
        .appendChild(webcam.canvas);

    // AI判定用canvas取得
    zoomCanvas =
        document.getElementById("zoomCanvas");

    zoomCtx =
        zoomCanvas.getContext("2d");

    // ===== ピンチズーム =====

    const canvas = webcam.canvas;

    canvas.addEventListener(
        "touchmove",
        (e) => {

        if (e.touches.length === 2) {

            e.preventDefault();

            const dx =
                e.touches[0].clientX -
                e.touches[1].clientX;

            const dy =
                e.touches[0].clientY -
                e.touches[1].clientY;

            const distance =
                Math.sqrt(dx * dx + dy * dy);

            if (initialDistance === 0) {

                initialDistance = distance;
            }

            else {

                const scaleChange =
                    distance / initialDistance;

                zoomLevel *= scaleChange;

                // 最小1倍 最大3倍
                zoomLevel =
                    Math.max(
                        1,
                        Math.min(3, zoomLevel)
                    );

                // 見た目ズーム
                canvas.style.transform =
                    `scale(${zoomLevel})`;

                initialDistance = distance;
            }
        }

    }, { passive: false });

    canvas.addEventListener(
        "touchend",
        () => {

        initialDistance = 0;
    });

    // =====================

    labelContainer =
        document.getElementById(
            "label-container"
        );

    document
    .getElementById("webcam-container")
    .addEventListener("touchstart", () => {

    confirmedClass = "";
    confirmedURL = "";
    confirmedUntil = 0;

    stableName = "";
    stableCount = 0;

    currentURL = "";

    document
    .getElementById("productButton")
    .classList.remove("active");

    labelContainer.innerHTML =
        "商品を認識してください";
    });

    document
.getElementById("recognitionOverlay")
.addEventListener("touchstart", () => {

    confirmedClass = "";
    confirmedURL = "";
    confirmedUntil = 0;

    stableName = "";
    stableCount = 0;

    currentURL = "";

    document
    .getElementById("productButton")
    .classList.remove("active");

    document
    .getElementById("recognitionOverlay")
    .style.display = "none";

    labelContainer.innerHTML =
        "商品を認識してください";
});
    
    document
    .getElementById("recognitionOverlay")
    .style.display = "none";    
}

async function loop() {

    webcam.update();

    const now = Date.now();

    // 100msごとに判定
    if(now - lastPredictTime > 100){

        await predict();

        lastPredictTime = now;
    }

    window.requestAnimationFrame(loop);


}

async function predict() {

    const button =
        document.getElementById(
            "productButton"
        );

    // ===== AI用ズーム処理 =====

    const sourceWidth =
        webcam.canvas.width;

    const sourceHeight =
        webcam.canvas.height;

    const cropWidth =
        sourceWidth / zoomLevel;

    const cropHeight =
        sourceHeight / zoomLevel;

    const sx =
        (sourceWidth - cropWidth) / 2;

    const sy =
        (sourceHeight - cropHeight) / 2;

    zoomCtx.clearRect(0, 0, 300, 300);

    zoomCtx.drawImage(
        webcam.canvas,
        sx,
        sy,
        cropWidth,
        cropHeight,
        0,
        0,
        300,
        300
    );

    // AI判定
    const prediction =
        await model.predict(zoomCanvas);

    // 一番認識率高いもの取得
    let highest = prediction[0];

    for (let i = 1; i < prediction.length; i++) {

        if (
            prediction[i].probability >
            highest.probability
        ) {

            highest = prediction[i];
        }
    }

// ===== 連続認識チェック =====

if(highest.className === stableName){

    stableCount++;

}else{

    stableName = highest.className;
    stableCount = 1;
}

// ===== 商品確定 =====

if(
    highest.probability > 0.85 &&
    stableCount >= 3 &&
    highest.className !== "その他"
){

    const product =
        products.find(
            p => p.name === highest.className
        );

    if(product){

        confirmedClass = highest.className;
        confirmedURL = product.url;

        confirmedUntil =
            Date.now() + 5000;
    }
}

    // 表示
    if(Date.now() < confirmedUntil){

    labelContainer.innerHTML =
        confirmedClass;

    document
    .getElementById("recognitionOverlay")
    .style.display = "flex";
    }
    else{

    labelContainer.innerHTML =
        "商品を認識してください";

        document
    .getElementById("recognitionOverlay")
    .style.display = "none";
    }
    if(Date.now() < confirmedUntil){

    button.classList.add("active");

    }else{

    button.classList.remove("active");
    }

    // URL切り替え

    //     confirmedURL = "";

    // products.find(
    //     p => p.name === confirmedClass
    // );

    // if(!product){

    // confirmedClass = "";

    // return;

    //confirmedURL = product.url;

    // if(product){

    //     confirmedURL =
    //         product.url;
    // }
        // switch(confirmedClass) {

        //         break;

        //     case "ベルギーワッフル":

        //         confirmedURL =

        //     case "ピーナッツチョコ":

        //         "https://www.sej.co.jp/products/a/item/330642/";

        //     case "ジューシーハムサンド":

        //         "https://www.sej.co.jp/products/a/item/053583/";

        //         confirmedURL =

        //         break;
        // }

        // ボタンON
    //     if(
    //         confirmedURL !== "" &&
    //         highest.className !== "その他"
    //     ){
            
    //         button.classList.add("active");
    //     }

}

// ボタン押した時
document
.getElementById("productButton")
.onclick = () => {

   if(confirmedURL !== "") {

    window.open(confirmedURL);
    }
}

// 検索欄
const searchBox =
    document.getElementById("searchBox");

// Enterで検索
searchBox.addEventListener(
    "keydown",
    (e) => {

    if(e.key === "Enter") {

        const keyword =
            searchBox.value.trim();

        if(keyword !== "") {

            const searchURL =
                "https://www.sej.co.jp/products/a/itemresult/?key=" +
                encodeURIComponent(keyword) + "&x=0&y=0";

            window.open(searchURL);
        }
    }
});

async function loadProducts(){

    const response =
        await fetch("./my_model/products.xlsx");

    const arrayBuffer =
        await response.arrayBuffer();

    const workbook =
        XLSX.read(arrayBuffer, {
            type: "array"
        });

    // 一枚目のシート取得
    const sheet =
        workbook.Sheets[
            workbook.SheetNames[0]
        ];

   products =
    XLSX.utils.sheet_to_json(sheet,{
        range:1,header:0
    });
